<!DOCTYPE html>
<html>

<head>
    <title>Pengecekan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    {% include 'navbar.html' %}

<div class="container mt-4">

    <h2>Pengecekan Gardu</h2>

    <div class="card p-4 shadow">

        <div class="mb-3">
            <label>Nama Gardu</label>
            <select class="form-control">
                <option>Gardu A</option>
                <option>Gardu B</option>
            </select>
        </div>

        <h5>Checklist Pengecekan</h5>

        <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">
                Tegangan Normal
            </label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">
                Arus Beban Normal
            </label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">
                Tidak Overload
            </label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">
                Suhu Trafo Normal
            </label>
        </div>

        <div class="mt-3">
            <label>Nama Petugas</label>
            <input type="text"
                   class="form-control"
                   placeholder="Masukkan nama petugas">
        </div>

        <div class="mt-3">
            <label>Keterangan</label>
            <textarea class="form-control"
                      rows="3"></textarea>
        </div>

        <button class="btn btn-primary mt-4">
            Simpan Pengecekan
        </button>

    </div>

    <br>

    <div class="card p-3">

        <h5>Status Gardu</h5>

        <table class="table">

            <tr>
                <th>Gardu</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>Gardu A</td>
                <td>
                    <span class="badge bg-success">
                        Sudah Dicek
                    </span>
                </td>
            </tr>

            <tr>
                <td>Gardu B</td>
                <td>
                    <span class="badge bg-danger">
                        Belum Dicek
                    </span>
                </td>
            </tr>

        </table>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
