<!DOCTYPE html>
<html>

<head>
    <title>Penyulang</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">
    {% include 'navbar.html' %}

<div class="container mt-4">

    <h2>Manajemen Beban Trafo</h2>

    <div class="card shadow p-4">

        <div class="mb-3">
            <label class="form-label">
                Nama Gardu
            </label>

            <select class="form-select">
                <option>Gardu A</option>
                <option>Gardu B</option>
                <option>Gardu C</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Kapasitas Trafo (kVA)
            </label>

            <input type="number"
                   id="kva"
                   class="form-control"
                   value="200">
        </div>

        <div class="mb-3">
            <label class="form-label">
                Tegangan (Volt)
            </label>

            <input type="number"
                   id="tegangan"
                   class="form-control"
                   value="400">
        </div>

        <div class="mb-3">
            <label class="form-label">
                Arus Beban (Ampere)
            </label>

            <input type="number"
                   id="arus"
                   class="form-control"
                   value="180">
        </div>

        <button type="button"
                class="btn btn-primary w-100"
                onclick="hitung()">
            Hitung Pembebanan
        </button>

    </div>

    <br>

    <div class="card shadow p-4">

        <h3>Hasil Perhitungan</h3>

        <hr>

        <h5>
            Arus Nominal :
            <span id="nominal">-</span>
        </h5>

        <h5>
            Persentase :
            <span id="persen">-</span>
        </h5>

        <h5>
            Status :
            <span id="status">-</span>
        </h5>

        <h5>
            Rekomendasi :
            <span id="rekomendasi">-</span>
        </h5>

    </div>

</div>

<script>

function hitung() {

    var kva = Number(document.getElementById("kva").value);

    var tegangan = Number(
        document.getElementById("tegangan").value
    );

    var arus = Number(
        document.getElementById("arus").value
    );

    var nominal =
        (kva * 1000) /
        (1.732 * tegangan);

    var persen =
        (arus / nominal) * 100;

    var status = "";

    var rekomendasi = "";

   if (persen < 20) {
    status = "Rendah";
    rekomendasi = "Beban sangat rendah.";
    }
    else if (persen < 80) {
        status = "Normal";
        rekomendasi = "Beban aman.";
    }
    else if (persen <= 100) {
        status = "Waspada";
        rekomendasi = "Perlu pemantauan.";
    }
    else {
        status = "Overload";
        rekomendasi = "Segera lakukan penanganan.";
    }

    document.getElementById("nominal").innerHTML =
        nominal.toFixed(2) + " A";

    document.getElementById("persen").innerHTML =
        persen.toFixed(2) + " %";

    document.getElementById("status").innerHTML =
        status;

    document.getElementById("rekomendasi").innerHTML =
        rekomendasi;
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
