<!DOCTYPE html>
<html>

<head>
    <title>Data Penyulang</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

{% include 'navbar.html' %}

<div class="container mt-4">

    <h2 class="mb-4">
        Data Penyulang
    </h2>

    <div class="card shadow p-4">

        <table class="table table-hover align-middle">

            <thead class="table-primary">

                <tr>
                    <th>Penyulang</th>
                    <th>Wilayah</th>
                    <th>Jumlah Gardu</th>
                    <th>Beban Rata-rata</th>
                    <th>Gardu Overload</th>
                    <th>Status</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td>PLG-01</td>
                    <td>Desa A</td>
                    <td>5</td>
                    <td>72%</td>
                    <td>0</td>
                    <td>
                        <span class="badge bg-success">
                            Normal
                        </span>
                    </td>
                </tr>

                <tr>
                    <td>PLG-02</td>
                    <td>Desa B</td>
                    <td>3</td>
                    <td>88%</td>
                    <td>1</td>
                    <td>
                        <span class="badge bg-warning text-dark">
                            Waspada
                        </span>
                    </td>
                </tr>

                <tr>
                    <td>PLG-03</td>
                    <td>Desa C</td>
                    <td>2</td>
                    <td>110%</td>
                    <td>1</td>
                    <td>
                        <span class="badge bg-danger">
                            Overload
                        </span>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
