<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    {% include 'navbar.html' %}

    <div class="header">
        <h3>Monitoring Beban Trafo</h3>
        <p>Halo, {{ username }}</p>
    </div>

    <div class="container mt-4">

        <div class="row g-3">

            <div class="col-md-3">
                <div class="stat-card">
                    <h2>{{ gardu }}</h2>
                    <p>Gardu</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-card">
                    <h2>{{ penyulang }}</h2>
                    <p>Penyulang</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-card">
                    <h2>{{ beban }}%</h2>
                    <p>Beban Rata-rata</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-card">
                    <h2>{{ overload }}</h2>
                    <p>Gardu Overload</p>
                </div>
            </div>

        </div>

        <br>

        <div class="row g-3">

            <div class="col-md-3">
                <a href="/gardu" style="text-decoration:none">
                    <div class="card-menu">
                        <div class="menu-icon">🏭</div>
                        <p>Data Gardu</p>
                    </div>
                </a>
            </div>

            <div class="col-md-3">
                <a href="/penyulang" style="text-decoration:none">
                    <div class="card-menu">
                        <div class="menu-icon">⚡</div>
                        <p>Penyulang</p>
                    </div>
                </a>
            </div>

            <div class="col-md-3">
                <a href="/pembebanan" style="text-decoration:none">
                    <div class="card-menu">
                        <div class="menu-icon">📈</div>
                        <p>Pembebanan</p>
                    </div>
                </a>
            </div>

            <div class="col-md-3">
                <a href="/pengecekan" style="text-decoration:none">
                    <div class="card-menu">
                        <div class="menu-icon">📋</div>
                        <p>Pengecekan</p>
                    </div>
                </a>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
